<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>모동숲 주민 관리</title>
    <style>
      #sidebar:not(.is-open),
      #sidebarBackdrop:not(.is-visible) {
        display: none !important;
      }

      #sidebarBackdrop.is-visible {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: block !important;
        background: rgba(24, 34, 26, 0.42);
      }

      #sidebar.is-open {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 40;
        display: flex !important;
        flex-direction: column;
        width: 280px;
        max-width: 82vw;
        height: 100%;
        padding: 16px;
        background: #fffdf7;
        border-right: 1px solid #d9dfd0;
        box-shadow: 8px 0 32px rgba(40, 55, 39, 0.16);
      }

      .top-nav {
        display: flex;
        align-items: center;
        width: 100vw;
        margin-left: calc(50% - 50vw);
        min-height: 52px;
        padding: 8px 14px;
        padding-top: calc(8px + env(safe-area-inset-top, 0px));
        background: #fffdf7;
        border-bottom: 1px solid #d9dfd0;
      }

      .menu-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        border: 0;
        border-radius: 12px;
        background: #236244;
        color: #ffffff;
      }

      .menu-button svg {
        width: 22px;
        height: 22px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.2;
        stroke-linecap: round;
      }

      .villager-image,
      .owned-item img {
        width: 78px;
        height: 78px;
        max-width: 78px;
        max-height: 78px;
        object-fit: contain;
      }

      .owned-item img {
        width: 48px;
        height: 48px;
        max-width: 48px;
        max-height: 48px;
      }
    </style>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="sidebarBackdrop" class="sidebar-backdrop"></div>

    <aside id="sidebar" class="sidebar" aria-hidden="true" aria-label="메뉴">
      <div class="sidebar-header">
        <p class="sidebar-label">메뉴</p>
        <button
          id="menuCloseButton"
          class="menu-close-button"
          type="button"
          aria-label="메뉴 닫기"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" />
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav" aria-label="주요 메뉴">
        <button
          class="sidebar-link is-active"
          type="button"
          data-view="search"
        >
          주민 검색
        </button>
        <button class="sidebar-link" type="button" data-view="owned">
          우리 섬 주민
        </button>
      </nav>

      <a
        class="turnip-link sidebar-turnip-link"
        href="https://turnipprophet.io/"
        target="_blank"
        rel="noopener noreferrer"
      >
        무값 예측기
      </a>
    </aside>

    <main class="app-shell">
      <header class="topbar">
        <div class="top-nav">
          <button
            id="menuOpenButton"
            class="menu-button"
            type="button"
            aria-label="메뉴 열기"
            aria-controls="sidebar"
            aria-expanded="false"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7h16M4 12h16M4 17h16" />
            </svg>
          </button>
        </div>

        <div class="topbar-brand">
          <h1 class="site-title">
            <img src="./Title.png" alt="Animal Crossing: New Horizons 주민 관리" />
          </h1>
        </div>
      </header>

      <section
        id="searchView"
        class="view-panel search-panel"
        data-view="search"
        aria-labelledby="search-title"
      >
        <div class="section-heading">
          <h2 id="search-title">주민 검색</h2>
          <span id="dataStatus" class="status-pill">로컬 데이터</span>
        </div>
        <label class="search-box">
          <span class="sr-only">주민 이름</span>
          <input
            id="searchInput"
            type="search"
            autocomplete="off"
            placeholder="예: 쭈니, 잭슨, Raymond"
            enterkeyhint="search"
          />
        </label>
        <div id="searchResults" class="villager-grid" aria-live="polite"></div>
      </section>

      <section
        id="ownedView"
        class="view-panel owned-panel"
        data-view="owned"
        aria-labelledby="owned-title"
        hidden
      >
        <div class="section-heading">
          <h2 id="owned-title">우리 섬 주민</h2>
          <span id="ownedCount" class="status-pill">0명</span>
        </div>
        <div id="ownedVillagers" class="owned-list" aria-live="polite"></div>
      </section>
    </main>

    <template id="villagerCardTemplate">
      <article class="villager-card">
        <img class="villager-image" alt="" loading="lazy" width="78" height="78" />
        <div class="villager-info">
          <div class="name-row">
            <h3></h3>
            <button class="add-button" type="button">추가</button>
          </div>
          <dl>
            <div>
              <dt>성별</dt>
              <dd data-field="gender"></dd>
            </div>
            <div>
              <dt>성격</dt>
              <dd data-field="personality"></dd>
            </div>
            <div>
              <dt>말버릇</dt>
              <dd data-field="catchphrase"></dd>
            </div>
            <div>
              <dt>생일</dt>
              <dd data-field="birthday"></dd>
            </div>
          </dl>
        </div>
      </article>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
