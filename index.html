<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>모동숲 주민 관리</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="sidebarBackdrop" class="sidebar-backdrop" hidden></div>

    <aside id="sidebar" class="sidebar" aria-hidden="true" aria-label="메뉴">
      <div class="sidebar-header">
        <p class="sidebar-label">메뉴</p>
        <button
          id="menuCloseButton"
          class="menu-close-button"
          type="button"
          aria-label="메뉴 닫기"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" />
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav" aria-label="주요 메뉴">
        <button
          class="sidebar-link is-active"
          type="button"
          data-view="search"
        >
          주민 검색
        </button>
        <button class="sidebar-link" type="button" data-view="owned">
          우리 섬 주민
        </button>
      </nav>

      <a
        class="turnip-link sidebar-turnip-link"
        href="https://turnipprophet.io/"
        target="_blank"
        rel="noopener noreferrer"
      >
        무값 예측기
      </a>
    </aside>

    <main class="app-shell">
      <header class="topbar">
        <button
          id="menuOpenButton"
          class="menu-button"
          type="button"
          aria-label="메뉴 열기"
          aria-controls="sidebar"
          aria-expanded="false"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7h16M4 12h16M4 17h16" />
          </svg>
        </button>

        <div class="topbar-brand">
          <h1 class="site-title">
            <img src="./Title.png" alt="Animal Crossing: New Horizons 주민 관리" />
          </h1>
        </div>
      </header>

      <section
        id="searchView"
        class="view-panel search-panel"
        data-view="search"
        aria-labelledby="search-title"
      >
        <div class="section-heading">
          <h2 id="search-title">주민 검색</h2>
          <span id="dataStatus" class="status-pill">로컬 데이터</span>
        </div>
        <label class="search-box">
          <span class="sr-only">주민 이름</span>
          <input
            id="searchInput"
            type="search"
            autocomplete="off"
            placeholder="예: 쭈니, 잭슨, Raymond"
            enterkeyhint="search"
          />
        </label>
        <div id="searchResults" class="villager-grid" aria-live="polite"></div>
      </section>

      <section
        id="ownedView"
        class="view-panel owned-panel"
        data-view="owned"
        aria-labelledby="owned-title"
        hidden
      >
        <div class="section-heading">
          <h2 id="owned-title">우리 섬 주민</h2>
          <span id="ownedCount" class="status-pill">0명</span>
        </div>
        <div id="ownedVillagers" class="owned-list" aria-live="polite"></div>
      </section>
    </main>

    <template id="villagerCardTemplate">
      <article class="villager-card">
        <img class="villager-image" alt="" loading="lazy" />
        <div class="villager-info">
          <div class="name-row">
            <h3></h3>
            <button class="add-button" type="button">추가</button>
          </div>
          <dl>
            <div>
              <dt>성별</dt>
              <dd data-field="gender"></dd>
            </div>
            <div>
              <dt>성격</dt>
              <dd data-field="personality"></dd>
            </div>
            <div>
              <dt>말버릇</dt>
              <dd data-field="catchphrase"></dd>
            </div>
            <div>
              <dt>생일</dt>
              <dd data-field="birthday"></dd>
            </div>
          </dl>
        </div>
      </article>
    </template>

    <script src="./villagers-data.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
